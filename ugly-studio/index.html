  // called from Studio: turn a reaction into durable lessons
  async function learn({ verdict, note, context }){
    const existing = learnings.filter(l=>l.active).map(l=>`[${l.kind}] ${l.text}`).join("\n") || "(none yet)";
    const sys = "You maintain the design taste memory for the Ugly Donuts brand studio. "+
      "Turn the team's feedback into short, durable, reusable rules the AI crew must follow. "+
      "Each rule is one imperative sentence, specific, no em dashes. Classify each as dislike, emphasis, or mistake. "+
      "A 'mistake' is an error the AI made (like using an em dash, or ignoring the palette). "+
      "Do not restate rules that already exist. Return ONLY JSON.";
    const ask = `Existing rules:\n${existing}\n\n`+
      `Context: task=${context.task}; brief="${context.brief}"; headline="${context.headline||""}".\n`+
      `Team reaction: ${verdict==="emphasis"?"they liked it":"they want it fixed"}.\n`+
      `Their note: "${note}"\n\n`+
      `Return JSON: {"lessons":[{"kind":"dislike|emphasis|mistake","text":"..."}]}. `+
      `Only include genuinely new or clearly different lessons. If nothing new, return {"lessons":[]}.`;
    const { text } = await fnCall("ai-text",{ system:sys, messages:[{role:"user",content:ask}], max_tokens:600 });
    const j = stripJSON(text);
    const lessons = (j&&Array.isArray(j.lessons))?j.lessons:[];
    let added=0, bumped=0;
    for(const L of lessons){
      if(!L || !L.text) continue;
      const kind = ["dislike","emphasis","mistake"].includes(L.kind)?L.kind:(verdict==="emphasis"?"emphasis":"dislike");
      const sim = findSimilar(kind, L.text);
      if(sim){ await reinforce(sim, note); bumped++; }
      else { await insertLearning({ kind, text:L.text, example:note }); added++; }
    }
    if(!added && !bumped){
      // fallback: still record the raw note so nothing is lost
      const kind = verdict==="emphasis"?"emphasis":"dislike";
      const sim = findSimilar(kind, note);
      if(sim){ await reinforce(sim, note); bumped++; } else if(note.trim()){ await insertLearning({ kind, text:note.trim(), example:context.task }); added++; }
    }
    const parts=[];
    if(added) parts.push(`${added} new rule${added>1?"s":""} learned`);
    if(bumped) parts.push(`${bumped} rule${bumped>1?"s":""} reinforced (now stronger)`);
    return parts.length?parts.join(", ")+". The crew will apply it next time.":"Noted.";
  }

    if(sim){ await reinforce(sim,"manual"); return; }
    await insertLearning({kind,text,origin});

        {nav==="library" && <Library items={items} addItems={addItems} analyze={analyze} setItemKind={setItemKind} deleteItem={deleteItem} dna={dna} />}
        {nav==="studio"  && <Studio dna={dna} learnings={learnings} learn={learn} saveCreation={saveCreation} addToLibrary={addToLibrary} creations={creations} />}
        {nav==="learnings" && <Learnings learnings={learnings} addLearning={addLearning} toggleLearning={toggleLearning} removeLearning={removeLearning} />}
      </div>

      <button className="fab no-select" onClick={()=>setChatOpen(true)} title="Ask the studio">✦</button>
      <ChatSheet open={chatOpen} onClose={()=>setChatOpen(false)} dna={dna} learnings={learnings} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
<script>
/* Pull-to-refresh for the installed PWA (mobile touch only, top of page, no open sheet). */
(function(){
  var sy=0,pull=0,active=false,el=null;
  function ind(){el=document.createElement('div');el.style.cssText='position:fixed;top:-46px;left:50%;transform:translateX(-50%);z-index:150;background:#1A1512;color:#EABF70;font:700 12px Inter,sans-serif;padding:9px 16px;border-radius:999px;transition:top .12s;box-shadow:0 4px 14px rgba(0,0,0,.25);pointer-events:none;';el.textContent='\u2193 Pull to refresh';document.body.appendChild(el);}
  document.addEventListener('touchstart',function(e){ if((window.scrollY||0)<=0 && !document.querySelector('.sheet-bg')){ sy=e.touches[0].clientY; active=true; pull=0; } },{passive:true});
  document.addEventListener('touchmove',function(e){ if(!active)return; pull=e.touches[0].clientY-sy; if(pull>18){ if(!el)ind(); var p=Math.min(pull,120); el.style.top=(p*0.45-38)+'px'; el.textContent=p>=100?'\u21bb Release to refresh':'\u2193 Pull to refresh'; } },{passive:true});
  document.addEventListener('touchend',function(){ if(!active)return; active=false; if(el){ var willRefresh=pull>=100; el.style.top='-46px'; setTimeout(function(){ if(el){el.remove();el=null;} if(willRefresh) location.reload(); },160); } });
})();
</script>
</body>
</html>
