<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ugly Studio</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#FBF7EF">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ugly Studio">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FBF7EF; --paper:#FFFFFF; --gold:#EABF70; --gold-deep:#C8922E;
  --brick:#B23A2E; --brick-deep:#8F2D24; --ink:#1A1512; --ink-soft:#3B342C;
  --muted:#6E6559; --muted2:#9C9284; --line:#E7DECB; --line2:#DAD0BB;
  --ok:#3E7D57; --shadow:0 1px 2px rgba(40,30,15,.05),0 8px 24px rgba(40,30,15,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;}
.serif{font-family:'Fraunces','Playfair Display',Georgia,serif;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}
::selection{background:var(--gold);color:var(--ink);}
img{display:block;}

/* buttons */
.btn{border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:600;letter-spacing:.01em;transition:transform .06s ease,box-shadow .15s ease,background .15s ease;}
.btn:active{transform:translateY(1px);}
.btn-gold{background:var(--ink);color:var(--gold);}
.btn-gold:hover{background:#241d17;}
.btn-brick{background:var(--brick);color:#fff;}
.btn-brick:hover{background:var(--brick-deep);}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line2);}
.btn-ghost:hover{background:#fff;border-color:var(--gold-deep);}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* inputs */
.fld{width:100%;background:var(--paper);border:1px solid var(--line2);border-radius:10px;padding:11px 13px;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;}
.fld:focus{border-color:var(--gold-deep);}
textarea.fld{resize:vertical;line-height:1.55;}
label.lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}

/* ===== AUTH ===== */
.auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(120% 120% at 50% -10%, #fff 0%, var(--cream) 55%);}
.auth-card{width:380px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:38px 34px;box-shadow:var(--shadow);text-align:center;}
.auth-mark{width:76px;height:76px;object-fit:contain;margin:0 auto 14px;}
.auth-title{font-size:24px;font-weight:600;letter-spacing:-.01em;}
.auth-sub{color:var(--muted);font-size:12.5px;margin:4px 0 26px;}
.auth-card .lbl{text-align:left;}
.auth-card input{margin-bottom:14px;}
.auth-err{color:var(--brick);font-size:12.5px;margin-top:12px;min-height:16px;}

/* ===== SHELL ===== */
.shell{display:flex;min-height:100vh;}
.rail{width:230px;flex-shrink:0;background:var(--paper);border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.rail-top{padding:22px 22px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line);}
.rail-top img{width:38px;height:38px;object-fit:contain;}
.rail-top .rt-name{font-size:16px;font-weight:600;line-height:1;}
.rail-top .rt-sub{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-deep);font-weight:700;margin-top:3px;}
.docrow{display:grid;grid-template-columns:46px 1fr auto;gap:12px;align-items:center;background:var(--paper);padding:11px 14px;}
.doc-i{font-family:'Fraunces',serif;font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--muted2);
  border:1px solid var(--line2);border-radius:7px;padding:6px 0;text-align:center;}
.doc-n{font-weight:600;font-size:13px;line-height:1.35;word-break:break-word;}
.doc-s{font-size:11.5px;color:var(--muted);margin-top:2px;}
.doc-a{display:flex;gap:11px;align-items:center;}
@media(max-width:620px){.docrow{grid-template-columns:40px 1fr;}.doc-a{grid-column:1/-1;}}
.absorbed{display:flex;align-items:center;gap:8px;background:#f2f7f2;border:1px solid #d8e6d8;border-radius:9px;
  padding:9px 12px;margin-bottom:10px;font-size:12.5px;color:#2f5d3a;line-height:1.45;}
.ab-dot{width:8px;height:8px;border-radius:50%;background:#3f8b52;flex-shrink:0;}
.sizes{display:flex;gap:9px;flex-wrap:wrap;}
.sizebtn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 14px;border-radius:11px;
  border:1px solid var(--line2);background:#fff;font-family:inherit;transition:all .12s;min-width:104px;}
.sizebtn:hover{border-color:var(--gold-deep);}
.sizebtn.on{border-color:var(--ink);background:var(--cream);}
.sz-icon{display:block;border:2px solid var(--muted2);border-radius:3px;}
.sizebtn.on .sz-icon{border-color:var(--ink);}
.sz-1-1{width:24px;height:24px;}
.sz-2-3{width:18px;height:26px;}
.sz-3-2{width:28px;height:19px;}
.sz-l{font-size:12px;font-weight:600;color:var(--ink);}
.sz-r{font-size:10.5px;color:var(--muted);}
.specline{font-size:13.5px;line-height:1.6;color:var(--ink-soft);margin-top:6px;max-width:680px;}
.specline b{color:var(--ink);font-weight:600;margin-right:6px;}
.pullq{font-size:16px;line-height:1.6;color:var(--ink);margin:14px 0;padding-left:14px;border-left:3px solid var(--gold);font-style:italic;max-width:660px;}
.ruleblock{background:var(--cream);border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin-top:10px;font-size:12.5px;line-height:1.55;color:var(--ink-soft);}
.ruleblock b{color:var(--ink);margin-right:5px;}
.pillars{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:16px;}
.pillar{background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:12px 13px;}
.pillar-n{font-weight:600;font-size:13px;margin-bottom:4px;}
.pillar-d{font-size:12px;line-height:1.5;color:var(--muted);}
.sw-never{font-size:11px;color:var(--brick);margin-top:3px;line-height:1.4;}
.traits{display:grid;gap:8px;margin-top:12px;}
.trait{font-size:12.5px;line-height:1.5;color:var(--muted);}
.trait b{color:var(--ink);margin-right:6px;}
.mini-h{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);font-weight:700;margin-bottom:6px;}
.tagrow{display:flex;flex-wrap:wrap;gap:5px;}
.ttag.off{background:#fdf0ee;color:var(--brick);}
.specgrid{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.specrow{display:grid;grid-template-columns:210px 1fr;gap:14px;background:var(--paper);padding:11px 14px;}
.spec-a{font-weight:600;font-size:13px;line-height:1.4;}
.spec-b{display:flex;flex-direction:column;font-size:12.5px;line-height:1.55;color:var(--muted);}
.spec-b b{color:var(--gold-deep);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.never-t{color:var(--brick);margin-top:3px;}
.fld-err{border-color:var(--brick);}
@media(max-width:760px){.specrow{grid-template-columns:1fr;gap:4px;}}
.rail-x{display:none;margin-left:auto;background:none;border:none;font-size:20px;line-height:1;color:var(--muted);padding:6px 4px;align-self:flex-start;}
.rail-x:hover{color:var(--ink);}
.rail-scrim{position:fixed;inset:0;background:rgba(33,28,22,.42);z-index:35;}
@media(max-width:820px){.rail-x{display:inline-flex;}}
@media(min-width:821px){.rail-scrim{display:none;}}
.brandsw{display:flex;gap:5px;padding:12px 14px 4px;}
.bsw{flex:1;padding:8px 6px;border-radius:9px;border:1px solid var(--line2);background:#fff;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);transition:all .12s;}
.bsw:hover{border-color:var(--gold-deep);}
.bsw.on{background:var(--ink);color:var(--gold);border-color:var(--ink);}
.nav{padding:14px 12px;display:flex;flex-direction:column;gap:2px;flex:1;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;color:var(--ink-soft);
  font-size:13.5px;font-weight:500;background:none;border:none;text-align:left;width:100%;transition:background .12s,color .12s;}
.nav-item:hover{background:var(--cream);}
.nav-item.on{background:var(--ink);color:var(--gold);font-weight:600;}
.nav-item .ic{width:18px;text-align:center;font-size:15px;}
.rail-foot{padding:14px 18px;border-top:1px solid var(--line);}
.rail-foot .who{font-size:11.5px;color:var(--muted);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mode-chip{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-bottom:10px;}
.mode-live{background:#EAF5EE;color:var(--ok);}
.mode-local{background:#FBEFE0;color:var(--gold-deep);}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
/* brand context bar: the brand is always in the room */
.ctxbar{display:flex;align-items:center;gap:16px;padding:12px 30px;background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;}
.ctx-tag{font-family:'Fraunces',serif;font-style:italic;font-size:15px;color:var(--ink);}
.ctx-dots{display:flex;gap:5px;margin-left:auto;}
.ctx-dots span{width:15px;height:15px;border-radius:50%;border:1px solid rgba(0,0,0,.08);}
.wrap{padding:30px;max-width:1180px;width:100%;}
.page-h{font-size:27px;font-weight:600;letter-spacing:-.015em;}
.page-sub{color:var(--muted);font-size:13.5px;margin-top:5px;margin-bottom:26px;max-width:640px;line-height:1.5;}

.card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:var(--shadow);}
.card + .card{margin-top:18px;}
.card-h{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:14px;}

/* palette */
.pal{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.sw{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;}
.sw-chip{height:66px;}
.sw-body{padding:10px 12px;}
.sw-name{font-weight:600;font-size:13px;}
.sw-hex{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums;text-transform:uppercase;}
.sw-role{font-size:11px;color:var(--muted2);margin-top:4px;line-height:1.35;}

.two{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.dolist{list-style:none;display:flex;flex-direction:column;gap:9px;}
.dolist li{display:flex;gap:9px;font-size:13px;line-height:1.45;color:var(--ink-soft);}
.dolist .mk{flex-shrink:0;font-weight:700;}
.do .mk{color:var(--ok);}
.dont .mk{color:var(--brick);}

/* library */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--line2);background:#fff;font-size:12px;font-weight:500;color:var(--muted);}
.chip.on{background:var(--ink);color:var(--gold);border-color:var(--ink);font-weight:600;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;align-items:start;}
.tile{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;}
.tile-img{background:var(--cream);position:relative;line-height:0;min-height:64px;}
.tile-img img{width:100%;height:auto;display:block;}
.tile-img.doc{aspect-ratio:4/5;}
.tile-kind{position:absolute;top:9px;left:9px;background:rgba(26,21,18,.82);color:#fff;font-size:10px;font-weight:600;
  letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:6px;}
.tile-doc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;
  font-size:22px;font-weight:600;color:var(--muted2);letter-spacing:.1em;}
.tile-body{padding:12px 13px;flex:1;display:flex;flex-direction:column;gap:7px;}
.tile-title{font-weight:600;font-size:13.5px;line-height:1.25;}
.tile-cat{align-self:flex-start;font-family:inherit;font-size:11px;color:var(--muted);background:var(--cream);
  border:1px solid var(--line2);border-radius:7px;padding:3px 6px;outline:none;max-width:100%;}
.tile-cat:focus{border-color:var(--gold-deep);}
.tile-an{font-size:11.5px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.tile-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto;}
.tile-foot{display:flex;gap:12px;margin-top:10px;padding-top:9px;border-top:1px solid var(--line);}
.tile-link{background:none;border:none;font-family:inherit;font-size:11.5px;font-weight:600;color:var(--muted);padding:0;}
.tile-link:hover{color:var(--ink);}
.tile-link.del:hover{color:var(--brick);}
.ttag{font-size:10px;background:var(--cream);color:var(--muted);padding:2px 7px;border-radius:5px;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);border:1.5px dashed var(--line2);border-radius:16px;background:#fff;}
.empty .em-ic{font-size:34px;margin-bottom:10px;}
.lweight{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;letter-spacing:.03em;
  padding:4px 9px;border-radius:20px;background:#FBEFE0;color:var(--gold-deep);white-space:nowrap;}
/* studio feedback */
.fb{margin-top:14px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:#fff;}
.fb-h{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.applied{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--gold-deep);
  background:#FBEFE0;padding:4px 10px;border-radius:20px;margin-left:auto;}
.learned-toast{margin-top:10px;font-size:12.5px;color:var(--ok);background:#EAF5EE;border-radius:9px;padding:9px 12px;line-height:1.45;}

/* studio */
.crew{display:flex;gap:14px;align-items:stretch;margin-bottom:22px;}
.crew-card{flex:1;background:#fff;border:1px solid var(--line);border-radius:13px;padding:15px 16px;box-shadow:var(--shadow);}
.crew-role{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--gold-deep);}
.crew-who{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin:3px 0 5px;}
.crew-does{font-size:11.5px;color:var(--muted);line-height:1.4;}
.crew-arrow{align-self:center;color:var(--gold-deep);font-size:20px;flex-shrink:0;}
.crew-card .badge{display:inline-block;margin-top:9px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--cream);color:var(--muted);}
.crew-card.busy .badge{background:#FBEFE0;color:var(--gold-deep);}
.crew-card.done .badge{background:#EAF5EE;color:var(--ok);}

.tasks{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.task{padding:9px 14px;border-radius:10px;border:1px solid var(--line2);background:#fff;font-size:12.5px;font-weight:500;color:var(--ink-soft);}
.task.on{background:var(--brick);color:#fff;border-color:var(--brick);font-weight:600;}

.director{background:var(--cream);border:1px solid var(--line);border-radius:13px;padding:18px 20px;margin-top:16px;}
.refs{margin-top:16px;}
.ref-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.ref-thumb{width:64px;height:64px;border-radius:10px;border:1px solid var(--line2);background:var(--cream) center/cover no-repeat;position:relative;flex-shrink:0;}
.ref-x{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;border:none;background:var(--ink);color:#fff;font-size:10px;line-height:1;display:flex;align-items:center;justify-content:center;}
.ref-add{width:64px;height:64px;border-radius:10px;border:1.5px dashed var(--line2);background:#fff;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.ref-add:hover{border-color:var(--gold-deep);color:var(--gold-deep);}.dir-k{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:4px;}
.dir-block+.dir-block{margin-top:13px;}
.dir-head{font-family:'Fraunces',serif;font-size:22px;font-weight:600;line-height:1.2;}
.dir-sub{font-size:14px;color:var(--ink-soft);margin-top:3px;}
.dir-body{font-size:13px;color:var(--ink-soft);line-height:1.5;white-space:pre-wrap;}
.dir-cta{display:inline-block;background:var(--ink);color:var(--gold);font-weight:600;font-size:12px;padding:6px 13px;border-radius:8px;margin-top:4px;}

.result{margin-top:16px;display:grid;grid-template-columns:1fr;gap:14px;}
.result img{width:100%;border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(0,0,0,.15);border-top-color:var(--ink);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:7px;}
@keyframes sp{to{transform:rotate(360deg)}}

.hist{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:8px;}
.hist img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:10px;border:1px solid var(--line);}

.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.spacer{flex:1;}
.mut{color:var(--muted);font-size:12.5px;}
.hidden{display:none;}
@media(max-width:820px){
  .rail{position:fixed;z-index:40;transform:translateX(-100%);transition:transform .2s;}
  .rail.open{transform:none;}
  .two{grid-template-columns:1fr;} .crew{flex-direction:column;} .crew-arrow{transform:rotate(90deg);}
  .wrap{padding:20px 16px;} .ctxbar{padding:12px 16px;}
}
.burger{display:none;}
@media(max-width:820px){.burger{display:inline-flex;}}

/* ===== BOOT SPLASH (pre-React) ===== */
.boot-splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--cream);z-index:200;}
.boot-splash img{width:82px;height:82px;object-fit:contain;}
.boot-spinner{width:24px;height:24px;border-radius:50%;border:3px solid rgba(200,146,46,.2);border-top-color:var(--gold-deep);animation:sp .8s linear infinite;}
.boot-name{font-family:'Fraunces',serif;font-size:15px;color:var(--muted);font-weight:600;letter-spacing:.02em;}

/* ===== ERROR CARD ===== */
.crash{max-width:440px;margin:14vh auto;padding:28px;text-align:center;}
.crash h2{font-family:'Fraunces',serif;font-size:22px;margin-bottom:8px;}
.crash p{color:var(--muted);font-size:13.5px;line-height:1.5;margin-bottom:16px;}

/* ===== iOS: 16px inputs on mobile so focus never zooms ===== */
@media(max-width:820px){
  input,select,textarea,.fld{font-size:16px !important;}
}

/* ===== APP / ALERTS banners ===== */
.banner{margin:0 30px 0;margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.banner .bi{font-size:20px;}
.banner .bt{flex:1;font-size:12.5px;color:var(--ink-soft);line-height:1.4;}

    const room = limit - used - head.length;
    if (room <= 0) break;

  const dis = grp("dislike"), emp = grp("emphasis"), mis = grp("mistake");
  const out = ["", "WHAT WE HAVE LEARNED FROM THE TEAM (obey these over your defaults):"];
  if (dis) out.push("Things we dislike, never produce them:\n" + dis);
  if (emp) out.push("Things we always emphasize, carry them through:\n" + emp);
  if (mis) out.push("Mistakes you keep making, do not repeat them:\n" + mis);
  return out.join("\n");
}

async function fnCall(name, payload) {

function fileToB64(file) {
  return new Promise((res, rej) => {

function stripJSON(t) {
  if (!t) return null;
  const m = t.match(/```(?:json)?([\s\S]*?)```/);
  let s = (m ? m[1] : t).trim();
  const a = s.indexOf("{"), b = s.lastIndexOf("}");
  if (a >= 0 && b > a) s = s.slice(a, b + 1);
  try { return JSON.parse(s); } catch {}
  // fallback: repair a truncated object by closing dangling string + open brackets in reverse order
  const start = t.indexOf("{"); if (start < 0) return null;
  let r = t.slice(start).replace(/[\s,]+$/, "");
  const stack = []; let inStr = false, esc = false;
  for (let i = 0; i < r.length; i++) {
    const c = r[i];
    if (inStr) { if (esc) esc = false; else if (c === "\\") esc = true; else if (c === '"') inStr = false; continue; }
    if (c === '"') inStr = true;
    else if (c === "{" || c === "[") stack.push(c);
    else if (c === "}" || c === "]") stack.pop();
  }
  if (inStr) r += '"';
  r = r.replace(/[\s,]+$/, "");
  for (let i = stack.length - 1; i >= 0; i--) r += stack[i] === "{" ? "}" : "]";
  try { return JSON.parse(r); } catch { return null; }
}
function b64ToBlob(b64, mime = "image/png") {
  const bin = atob(b64); const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}
function urlB64ToUint8(base64) {
  const pad = "=".repeat((4 - (base64.length % 4)) % 4);
  const b64 = (base64 + pad).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(b64); const out = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
  return out;
}

/* ---- file processing: shrink on receipt so storage stays light ---- */
function loadImageFromBlob(blob){
  return new Promise((res,rej)=>{ const img=new Image(); const u=URL.createObjectURL(blob);
    img.onload=()=>{ URL.revokeObjectURL(u); res(img); }; img.onerror=()=>{ URL.revokeObjectURL(u); rej(new Error("image decode failed")); }; img.src=u; });
}
async function shrinkImage(blob, maxDim, type, quality){
  const img = await loadImageFromBlob(blob);
  const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
  const w = Math.max(1, Math.round(img.width*scale)), h = Math.max(1, Math.round(img.height*scale));
  const cv = document.createElement("canvas"); cv.width=w; cv.height=h;
  const ctx = cv.getContext("2d");
  if (type === "image/jpeg"){ ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,w,h); } // flatten alpha for jpeg
  ctx.drawImage(img,0,0,w,h);
  const out = await new Promise(r=>cv.toBlob(r, type, quality));
  return { blob: out, w, h };
}

}

function htmlToText(html){
  try {

    const t = (d.body && (d.body.innerText || d.body.textContent)) || "";

function fileKind(file){
  const t = file.type || "";

/* ---- brand theming: drive accent variables from the active brand's palette ---- */
function darken(hex, amt){
  const m = /^#?([0-9a-f]{6})$/i.exec(hex||""); if(!m) return hex;
  let n = parseInt(m[1],16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.max(0,Math.round(r*(1-amt))); g=Math.max(0,Math.round(g*(1-amt))); b=Math.max(0,Math.round(b*(1-amt)));
  return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
function applyBrandTheme(dna){
  const cols = dna.colors || [];
  const prim = (cols[0] && cols[0].hex) || "#EABF70";
  const acc  = (cols[1] && cols[1].hex) || "#B23A2E";
  const root = document.documentElement.style;
  root.setProperty("--gold", prim);
  root.setProperty("--gold-deep", darken(prim, 0.22));
  root.setProperty("--brick", acc);
  root.setProperty("--brick-deep", darken(acc, 0.22));
}

    setBookBusy(true);
    try { const t = await reAbsorbDoc(b.id, (m)=>setBookProgress(`${b.name}: ${m}`)); alert(`Re-absorbed ${b.name} (${(t||"").length.toLocaleString()} characters).`); }
    catch(err){ alert(err.message||String(err)); }
    finally { setBookBusy(false); setBookProgress(""); }
  }
  async function onRemoveDoc(b){
    if(typeof confirm==="function" && !confirm(`Forget "${b.name}"? The crew will stop using it.`)) return;
    setBookBusy(true);
    try { await removeDoc(b.id); } catch(err){ alert(err.message||String(err)); }
    finally { setBookBusy(false); }
  }

  const d = edit ? draft : dna;
  const ADV = ["philosophy","audience","taglines","tagline_rule","naming","logo","illustration","photography","signage","color_rule","typography","voice","colors"];
  const advOf = (o)=>{ const x={}; ADV.forEach(k=>{ if(o[k]!==undefined) x[k]=o[k]; }); return JSON.stringify(x,null,2); };
  const [advText, setAdvText] = useState(()=>advOf(dna));
  const [advErr, setAdvErr] = useState("");
  useEffect(()=>{ if(edit) { setAdvText(advOf(draft)); setAdvErr(""); } }, [edit]);
  // Union lists by name so nothing the founder wrote is lost, and nothing from the book stays missing.
  function unionByName(mine, base){
    const out = (mine||[]).slice();
    (base||[]).forEach(b=>{
      if(!b || !b.name) return;
      if(!out.some(x=>x && x.name && String(x.name).toLowerCase()===String(b.name).toLowerCase())) out.push(b);
    });
    return out;
  }
  function restoreBookDefaults(){
    const base = defaultDNA(brand);
    let next = mergeDNA(base, draft);
    ["colors","taglines","naming"].forEach(k=>{ next[k] = unionByName(draft[k], base[k]); });
    next.logo = { ...next.logo, marks: unionByName((draft.logo||{}).marks, (base.logo||{}).marks) };
    next.illustration = { ...next.illustration, items: unionByName((draft.illustration||{}).items, (base.illustration||{}).items) };
    next.signage = { ...next.signage, elements: unionByName((draft.signage||{}).elements, (base.signage||{}).elements) };
    next.voice = { ...next.voice, traits: unionByName((draft.voice||{}).traits, (base.voice||{}).traits) };
    next.philosophy = { ...next.philosophy, pillars: unionByName((draft.philosophy||{}).pillars, (base.philosophy||{}).pillars) };
    next.logo_url = draft.logo_url; next.brandbook = draft.brandbook;
    setDraft(next); setAdvText(advOf(next)); setAdvErr("");
  }
  function onAdv(v){
    setAdvText(v);
    try { const j = JSON.parse(v); setAdvErr(""); setDraft({ ...draft, ...j }); }
    catch(e){ setAdvErr("Not valid yet: " + e.message); }
  }
  const upd = (path, val) => {
    const n = JSON.parse(JSON.stringify(draft));
    let o = n; for (let i=0;i<path.length-1;i++) o = o[path[i]];
    o[path[path.length-1]] = val; setDraft(n);
  };
  return (
    <div className="wrap">
      <div className="row">
        <div>
          <div className="page-h serif">Brand DNA</div>
          <div className="page-sub">Set this once. Every poster, caption and design in the studio is generated through it, so the crew always speaks in our voice.</div>
        </div>
        <div className="spacer"></div>
        {edit
          ? <div className="row"><button className="btn btn-ghost btn-sm" onClick={restoreBookDefaults} title="Add back anything from the built in baseline that is missing here. Nothing you wrote is removed.">Fill from defaults</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>{setEdit(false);setDraft(dna);}}>Cancel</button>
              <button className="btn btn-gold btn-sm" onClick={save} disabled={busy}>{busy?"Saving":"Save DNA"}</button></div>
          : <button className="btn btn-ghost btn-sm" onClick={()=>setEdit(true)}>Edit</button>}
      </div>

      <div className="card">
        <div className="card-h">Why we exist</div>
        {edit ? <>
          <label className="lbl">Tagline</label>
          <input className="fld" value={d.philosophy.tagline} onChange={e=>upd(["philosophy","tagline"],e.target.value)} style={{marginBottom:12}} />
          <label className="lbl">The why</label>
          <textarea className="fld" rows={4} value={d.philosophy.why} onChange={e=>upd(["philosophy","why"],e.target.value)} style={{marginBottom:12}} />
          <label className="lbl">Positioning</label>
          <textarea className="fld" rows={3} value={d.philosophy.positioning} onChange={e=>upd(["philosophy","positioning"],e.target.value)} />
        </> : <>
          <div className="dir-head serif" style={{fontSize:26,marginBottom:10}}>{d.philosophy.tagline}</div>
          {d.philosophy.feeling&&<p className="specline"><b>The one feeling we sell</b> {d.philosophy.feeling}</p>}
          {d.philosophy.mission&&<p className="specline"><b>Mission</b> {d.philosophy.mission}</p>}
          <p style={{fontSize:15,lineHeight:1.6,color:"var(--ink-soft)",maxWidth:680,marginTop:10}}>{d.philosophy.why}</p>
          {d.philosophy.founder_words&&<p className="pullq serif">{d.philosophy.founder_words}</p>}
          {d.philosophy.heritage&&<p className="specline"><b>Heritage</b> {d.philosophy.heritage}</p>}
          {d.philosophy.cultural_gesture&&<p className="specline"><b>Cultural gesture</b> {d.philosophy.cultural_gesture}</p>}
          <p className="mut" style={{marginTop:14,lineHeight:1.55,maxWidth:680}}>{d.philosophy.positioning}</p>
          {d.philosophy.story_order&&<div className="ruleblock"><b>Story order</b> {d.philosophy.story_order}</div>}
          {d.philosophy.positioning_rule&&<div className="ruleblock"><b>Positioning rule</b> {d.philosophy.positioning_rule}</div>}
          {(d.philosophy.pillars||[]).length>0&&<div className="pillars">
            {d.philosophy.pillars.map((p,i)=><div className="pillar" key={i}><div className="pillar-n">{p.name}</div><div className="pillar-d">{p.desc}</div></div>)}
          </div>}
        </>}
      </div>

      {(d.audience&&(d.audience.target||d.audience.market_position||d.audience.edge||d.audience.not_for))?
        <div className="card">
          <div className="card-h">Audience and market</div>
          <div className="specgrid">
            {[["target","Target customer"],["market_position","Market position"],["edge","Competitive edge"],["not_for","Who we are not for"]]
              .filter(([k])=>d.audience[k])
              .map(([k,label])=>(
                <div className="specrow" key={k}><div className="spec-a">{label}</div><div className="spec-b"><span>{d.audience[k]}</span></div></div>
            ))}
          </div>
        </div>:null}

      <div className="card">
        <div className="card-h">Logo</div>
        <div className="row" style={{alignItems:"center",gap:18}}>
          <div style={{width:96,height:96,borderRadius:14,border:"1px solid var(--line)",background:"var(--cream) center/contain no-repeat",backgroundImage:dna.logo_url?`url(${dna.logo_url})`:"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {!dna.logo_url&&<span className="mut" style={{fontSize:11}}>No logo</span>}
          </div>
          <div style={{flex:1}}>
            <p className="mut" style={{lineHeight:1.5,marginBottom:10}}>Upload this brand's real wordmark. It shows in the app and anchors the identity. PNG with transparency works best.</p>
            <button className="btn btn-ghost btn-sm" onClick={()=>logoRef.current&&logoRef.current.click()} disabled={logoBusy}>{logoBusy?<span className="spin"></span>:null}{logoBusy?"Uploading":(dna.logo_url?"Replace logo":"Upload logo")}</button>
            <input ref={logoRef} type="file" accept="image/*" className="hidden" onChange={onLogo} />
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-h">Brand documents</div>
        <p className="mut" style={{lineHeight:1.5,marginBottom:12}}>Upload the brand book, the menu book, or anything else the studio should know by heart. PDF or HTML. Each one is absorbed word for word and read on every job, so you never have to retype it here.</p>

        {(dna.books||[]).filter(b=>b&&b.text).length>0&&
          <div className="absorbed">
            <span className="ab-dot"></span>
            <span>Memorized and in use. {(dna.books||[]).filter(b=>b&&b.text).length} document{(dna.books||[]).filter(b=>b&&b.text).length>1?"s":""}, {(dna.books||[]).reduce((n,b)=>n+((b&&b.chars)||0),0).toLocaleString()} characters read on every job.</span>
          </div>}

        {(dna.books||[]).length>0&&
          <div className="specgrid" style={{marginBottom:12}}>
            {(dna.books||[]).map(b=>(
              <div className="docrow" key={b.id}>
                <div className="doc-i">{(b.kind==="html")?"HTML":(b.kind==="pdf")?"PDF":"IMG"}</div>
                <div className="doc-m">
                  <div className="doc-n">{b.name}</div>
                  <div className="doc-s">{b.chars?`${b.chars.toLocaleString()} characters absorbed`:"No readable text found"}</div>
                </div>
                <div className="doc-a">
                  {b.url&&<a className="tile-link" href={b.url} target="_blank" rel="noreferrer">View</a>}
                  <button className="tile-link" onClick={()=>onReAbsorb(b)} disabled={bookBusy}>Re-absorb</button>
                  <button className="tile-link del" onClick={()=>onRemoveDoc(b)} disabled={bookBusy}>Forget</button>
                </div>
              </div>
            ))}
          </div>}

        <button className="btn btn-gold btn-sm" onClick={()=>docRef.current&&docRef.current.click()} disabled={bookBusy}>
          {bookBusy?<span className="spin"></span>:null}{bookBusy?"Reading":"Upload documents"}
        </button>
        <input ref={docRef} type="file" accept="application/pdf,.pdf,text/html,.html,.htm,image/*" multiple className="hidden" onChange={onDocs} />
        {bookBusy&&bookProgress&&<div className="mut" style={{marginTop:9,fontSize:12}}><span className="spin"></span>{bookProgress}</div>}
        {!bookBusy&&<div className="mut" style={{marginTop:8,fontSize:11}}>These documents are the source of truth. Where they say something, they win over the summary cards below.</div>}
      </div>

      <div className="card">
        <div className="card-h">Palette</div>
        <div className="pal">
          {d.colors.map((c,i)=>(
            <div className="sw" key={i}>
              <div className="sw-chip" style={{background:c.hex}}></div>
              <div className="sw-body">
                {edit
                  ? <><input className="fld btn-sm" value={c.name} onChange={e=>{const n=[...draft.colors];n[i]={...n[i],name:e.target.value};setDraft({...draft,colors:n});}} style={{marginBottom:6,padding:"6px 8px"}}/>
                      <input className="fld btn-sm" value={c.hex} onChange={e=>{const n=[...draft.colors];n[i]={...n[i],hex:e.target.value};setDraft({...draft,colors:n});}} style={{padding:"6px 8px"}}/></>
                  : <><div className="sw-name">{c.name}</div><div className="sw-hex">{c.hex}{c.pantone?` · ${c.pantone}`:""}</div><div className="sw-role">{c.role}</div>{c.never?<div className="sw-never">Never: {c.never}</div>:null}</>}
              </div>
            </div>
          ))}
        </div>
        {d.color_rule&&<div className="ruleblock" style={{marginTop:14}}>{d.color_rule}</div>}
      </div>

      <div className="two">
        <div className="card">
          <div className="card-h">Voice</div>
          {edit
            ? <textarea className="fld" rows={3} value={d.voice.tone} onChange={e=>upd(["voice","tone"],e.target.value)} />
            : <p style={{fontSize:14,lineHeight:1.6,color:"var(--ink-soft)"}}>{d.voice.tone}</p>}
          {!edit&&(d.voice.traits||[]).length>0&&<div className="traits">
            {d.voice.traits.map((t,i)=><div className="trait" key={i}><b>{t.name}</b><span>{t.desc}</span></div>)}
          </div>}
          {!edit&&(d.voice.sound_like||[]).length>0&&<div style={{marginTop:12}}>
            <div className="mini-h">We sound like</div>
            <div className="tagrow">{d.voice.sound_like.map((x,i)=><span className="ttag" key={i}>{x}</span>)}</div>
          </div>}
          {!edit&&(d.voice.never_sound_like||[]).length>0&&<div style={{marginTop:10}}>
            <div className="mini-h">We never sound like</div>
            <div className="tagrow">{d.voice.never_sound_like.map((x,i)=><span className="ttag off" key={i}>{x}</span>)}</div>
          </div>}
          <div style={{height:18}}></div>
          <div className="card-h">Typography</div>
          {(d.typography.fonts||[]).length>0
            ? d.typography.fonts.map((f,i)=><p className="mut" style={{lineHeight:1.5,marginTop:i?8:0}} key={i}><b style={{color:"var(--ink)"}}>{f.name}</b> · {f.role}{f.weights?` · ${f.weights}`:""}{f.rule?<><br/><span style={{fontStyle:"italic"}}>{f.rule}</span></>:null}</p>)
            : <><p className="mut" style={{lineHeight:1.55}}><b style={{color:"var(--ink)"}}>Display</b> · {d.typography.display}</p>
                <p className="mut" style={{lineHeight:1.55,marginTop:4}}><b style={{color:"var(--ink)"}}>Body</b> · {d.typography.body}</p></>}
          <p className="mut" style={{lineHeight:1.55,marginTop:6,fontStyle:"italic"}}>{d.typography.note}</p>
          {d.typography.script_note&&<p className="mut" style={{lineHeight:1.5,marginTop:6}}>{d.typography.script_note}</p>}
        </div>
        <div className="card">
          <div className="card-h">Do and don't</div>
          <ul className="dolist do" style={{marginBottom:14}}>
            {d.voice.dos.map((x,i)=><li key={i}><span className="mk">✓</span><span>{x}</span></li>)}
          </ul>
          <ul className="dolist dont">
            {d.voice.donts.map((x,i)=><li key={i}><span className="mk">✕</span><span>{x}</span></li>)}
          </ul>
        </div>
      </div>

      {(d.taglines||[]).length>0&&
        <div className="card">
          <div className="card-h">Official lines</div>
          <div className="specgrid">
            {d.taglines.map((t,i)=>(
              <div className="specrow" key={i}>
                <div className="spec-a serif">{t.line}</div>
                <div className="spec-b"><b>{t.kind}</b><span>{t.use}</span></div>
              </div>
            ))}
          </div>
          {d.tagline_rule&&<div className="ruleblock" style={{marginTop:12}}>{d.tagline_rule}</div>}
        </div>}

      {(d.naming||[]).length>0&&
        <div className="card">
          <div className="card-h">Naming conventions</div>
          <div className="specgrid">
            {d.naming.map((n,i)=>(
              <div className="specrow" key={i}>
                <div className="spec-a">{n.pattern}</div>
                <div className="spec-b"><span>{n.rule}</span><span className="mut" style={{marginTop:3}}>{n.examples}</span></div>
              </div>
            ))}
          </div>
        </div>}

      {((d.logo&&(d.logo.marks||[]).length)||(d.logo&&d.logo.clear_space))?
        <div className="card">
          <div className="card-h">Logo system</div>
          <div className="specgrid">
            {(d.logo.marks||[]).map((m,i)=>(
              <div className="specrow" key={i}><div className="spec-a">{m.name}</div><div className="spec-b"><span>{m.use}</span>{m.file?<span className="mut" style={{marginTop:3}}>Files: {m.file}</span>:null}</div></div>
            ))}
          </div>
          {d.logo.clear_space&&<div className="ruleblock" style={{marginTop:12}}><b>Clear space</b> {d.logo.clear_space}</div>}
          {(d.logo.never||[]).length>0&&<ul className="dolist dont" style={{marginTop:12}}>
            {d.logo.never.map((x,i)=><li key={i}><span className="mk">✕</span><span>{x}</span></li>)}
          </ul>}
        </div>:null}

      {((d.illustration&&(d.illustration.items||[]).length)||(d.illustration&&d.illustration.style))?
        <div className="card">
          <div className="card-h">Illustration system</div>
          {d.illustration.style&&<div className="ruleblock" style={{marginBottom:12}}>{d.illustration.style}</div>}
          <div className="specgrid">
            {(d.illustration.items||[]).map((it,i)=>(
              <div className="specrow" key={i}>
                <div className="spec-a">{it.name}</div>
                <div className="spec-b"><span>{it.use}</span>{it.never?<span className="never-t">Never on: {it.never}</span>:null}</div>
              </div>
            ))}
          </div>
        </div>:null}

      {((d.photography&&(d.photography.principles||[]).length)||(d.photography&&d.photography.brief))?
        <div className="card">
          <div className="card-h">Photography and image direction</div>
          {(d.photography.principles||[]).length>0&&<div className="traits" style={{marginBottom:12}}>
            {d.photography.principles.map((p,i)=><div className="trait" key={i}><b>{p.name}</b><span>{p.desc}</span></div>)}
          </div>}
          {d.photography.brief&&<div className="ruleblock" style={{marginBottom:12}}><b>Photo brief</b> {d.photography.brief}</div>}
          {d.photography.spec&&Object.keys(d.photography.spec).length>0&&<div className="specgrid">
            {[["product","Product"],["lighting","Lighting"],["surfaces","Surfaces and set"],["composition","Composition"],["typography","On-image type"],["feel","Overall feel"]]
              .filter(([k])=>d.photography.spec[k])
              .map(([k,label])=>(
                <div className="specrow" key={k}><div className="spec-a">{label}</div><div className="spec-b"><span>{d.photography.spec[k]}</span></div></div>
            ))}
          </div>}
          {d.photography.note&&<div className="ruleblock" style={{marginTop:12}}>{d.photography.note}</div>}
        </div>:null}

      {((d.signage&&(d.signage.elements||[]).length)||(d.signage&&d.signage.consistency))?
        <div className="card">
          <div className="card-h">Signage and in-store</div>
          <div className="specgrid">
            {(d.signage.elements||[]).map((e,i)=>(
              <div className="specrow" key={i}><div className="spec-a">{e.name}</div><div className="spec-b"><span>{e.desc}</span></div></div>
            ))}
          </div>
          {d.signage.consistency&&<div className="ruleblock" style={{marginTop:12}}>{d.signage.consistency}</div>}
        </div>:null}

      {edit&&
        <div className="card">
          <div className="card-h">All brand book sections (advanced)</div>
          <p className="mut" style={{marginBottom:8,lineHeight:1.5}}>Everything the crew reads: story layers, official lines, naming, logo system, illustration, photography and signage. Edit as structured data. Invalid text is not saved until it parses.</p>
          <textarea className={"fld"+(advErr?" fld-err":"")} rows={16} value={advText} onChange={e=>onAdv(e.target.value)} spellCheck={false} style={{fontFamily:"ui-monospace,Menlo,monospace",fontSize:12,lineHeight:1.5}} />
          {advErr?<div className="mut" style={{color:"var(--brick)",marginTop:6,fontSize:12}}>{advErr}</div>
                 :<div className="mut" style={{marginTop:6,fontSize:12}}>Valid. Changes are in the draft, press Save DNA to keep them.</div>}
        </div>}

      {(edit || (d.guidelines && d.guidelines.length)) &&
        <div className="card">
          <div className="card-h">Full brand book guidelines</div>
          {edit
            ? <><p className="mut" style={{marginBottom:8,lineHeight:1.5}}>Everything absorbed from the brand book. The crew reads this on every job. Edit freely.</p>
                <textarea className="fld" rows={14} value={d.guidelines||""} onChange={e=>upd(["guidelines"],e.target.value)} style={{fontFamily:"inherit",lineHeight:1.55}} /></>
            : <div className="mut" style={{whiteSpace:"pre-wrap",lineHeight:1.6,fontSize:13,color:"var(--ink-soft)"}}>{d.guidelines}</div>}
        </div>}
    </div>
  );
}

/* ========================================================= LIBRARY ==== */
function Library({ items, addItems, analyze, setItemKind, deleteItem, dna }) {
  const [kind, setKind] = useState("all");
  const [q, setQ] = useState("");
  const [busyId, setBusyId] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [uploadKind, setUploadKind] = useState("auto");
  const fileRef = useRef(null);
  const PICK = KINDS.filter(k=>k!=="all");

  const shown = items.filter(it => (kind==="all"||it.kind===kind))
    .filter(it => { if(!q)return true; const s=(it.title+" "+(it.tags||[]).join(" ")+" "+(it.ai_analysis||"")).toLowerCase(); return s.includes(q.toLowerCase()); });

  async function onFiles(e) {
    const files = Array.from(e.target.files || []); if(!files.length) return;
    setUploading(true);
    try { await addItems(files, uploadKind); } finally { setUploading(false); if(fileRef.current) fileRef.current.value=""; }
  }
  async function runAnalyze(it) {
    setBusyId(it.id);
    try { await analyze(it); } catch(err){ alert("Analyze failed: "+err.message); }
    finally { setBusyId(null); }
  }

  return (
    <div className="wrap">
      <div className="row">
        <div>
          <div className="page-h serif">Library</div>
          <div className="page-sub">Posters, photos, store designs, interiors, menus, packaging, decks and more, kept in one place. Upload as Auto and the studio guesses by file type, or pick a category. You can change any item's category later.</div>
        </div>
        <div className="spacer"></div>
        <select className="fld" style={{width:"auto",padding:"8px 10px"}} value={uploadKind} onChange={e=>setUploadKind(e.target.value)} title="Category for the next upload">
          <option value="auto">Auto by file type</option>
          {PICK.map(k=><option key={k} value={k}>{KIND_LABEL[k]||k}</option>)}
        </select>
        <button className="btn btn-gold btn-sm" onClick={()=>fileRef.current&&fileRef.current.click()} disabled={uploading}>
          {uploading?<span className="spin"></span>:null}{uploading?"Uploading":"Upload work"}
        </button>
        <input ref={fileRef} type="file" accept="image/*,application/pdf,.pdf,text/html,.html,.htm" multiple className="hidden" onChange={onFiles} />
      </div>

      <div className="toolbar">
        <div className="chips">
          {KINDS.map(k=><button key={k} className={"chip"+(kind===k?" on":"")} onClick={()=>setKind(k)}>{k==="all"?"all":(KIND_LABEL[k]||k)}</button>)}
        </div>
        <div className="spacer"></div>
        <input className="fld" style={{maxWidth:230}} placeholder="Search title, tag, notes" value={q} onChange={e=>setQ(e.target.value)} />
      </div>

      {items.length>0&&
        <div className="card" style={{marginBottom:18}}>
          <div className="card-h">Collection at a glance</div>
          <BarChart data={KINDS.filter(k=>k!=="all").map(k=>({label:k,value:items.filter(it=>it.kind===k).length})).filter(d=>d.value>0).sort((a,b)=>b.value-a.value)} />
          <div className="mut" style={{marginTop:10,fontSize:11.5}}>{items.length} item{items.length>1?"s":""} in the library, {items.filter(it=>it.ai_analysis).length} studied by the crew.</div>
        </div>}

      {shown.length===0
        ? <div className="empty"><div className="em-ic">🗂️</div>
            <div style={{fontWeight:600,marginBottom:4}}>Nothing here yet</div>
            <div className="mut">Upload the posters and photos we already have. The crew learns from them.</div></div>
        : <div className="grid">
            {shown.map(it=>(
              <div className="tile" key={it.id}>
                <div className={"tile-img"+(it.thumb_url?"":" doc")}>
                  {it.thumb_url
                    ? <img src={it.thumb_url} alt={it.title} loading="lazy" onError={(e)=>{ if(it.file_url && e.target.src!==it.file_url) e.target.src=it.file_url; }} />
                    : <span className="tile-doc">{(it.tags||[]).includes("html")?"HTML":"FILE"}</span>}
                  <span className="tile-kind">{KIND_LABEL[it.kind]||it.kind}</span>
                </div>
                <div className="tile-body">
                  <div className="tile-title">{it.title}</div>
                  <select className="tile-cat" value={it.kind} onChange={e=>setItemKind(it, e.target.value)}>
                    {KINDS.filter(k=>k!=="all").map(k=><option key={k} value={k}>{KIND_LABEL[k]||k}</option>)}
                  </select>
                  {it._analyzing
                    ? <div className="mut" style={{fontSize:12}}><span className="spin"></span>Studying…</div>
                    : it.ai_analysis
                      ? <div className="tile-an">{it.ai_analysis}</div>
                      : <button className="btn btn-ghost btn-sm" style={{alignSelf:"flex-start"}} disabled={busyId===it.id} onClick={()=>runAnalyze(it)}>
                          {busyId===it.id?<span className="spin"></span>:null}{busyId===it.id?"Studying":"Study with Claude"}</button>}
                  {it.tags&&it.tags.length>0&&<div className="tile-tags">{it.tags.map((t,i)=><span className="ttag" key={i}>{t}</span>)}</div>}
                  <div className="tile-foot">
                    {it.ai_analysis&&!it._analyzing&&<button className="tile-link" onClick={()=>runAnalyze(it)}>Re-study</button>}
                    <button className="tile-link del" onClick={()=>deleteItem(it)}>Delete</button>
                  </div>
                </div>
              </div>
            ))}
          </div>}
    </div>
  );
}

/* ========================================================= STUDIO ===== */
function Studio({ dna, learnings, learn, saveCreation, addToLibrary, creations }) {
  const [task, setTask] = useState("poster");
  const [brief, setBrief] = useState("");
  const [dir, setDir] = useState(null);       // director JSON
  const [prompt, setPrompt] = useState("");
  const [img, setImg] = useState(null);       // {b64} or {url}
  const [phase, setPhase] = useState("idle"); // idle | directing | directed | rendering | done
  const [err, setErr] = useState("");
  const [fb, setFb] = useState("");           // feedback note
  const [learned, setLearned] = useState(""); // toast after learning
  const [fbBusy, setFbBusy] = useState(false);
  const [size, setSize] = useState(TASKS[0].size);
  const [refs, setRefs] = useState([]);       // reference images the director should consider
  const [refBusy, setRefBusy] = useState(false);
  const refInput = useRef(null);

  async function addRefs(e){
    const files = Array.from(e.target.files||[]); if(!files.length) return;
    setRefBusy(true);
    try {
      for(const f of files){ if(!(f.type||"").startsWith("image/")) continue; const r = await fileToImageBlock(f, 1024); setRefs(p=>[...p,{ id:Math.random().toString(36).slice(2), block:r.block, url:r.url }]); }
    } finally { setRefBusy(false); if(refInput.current) refInput.current.value=""; }
  }
  function removeRef(id){ setRefs(p=>p.filter(r=>r.id!==id)); }

  const taskObj = TASKS.find(t=>t.id===task);
  const appliedCount = (learnings||[]).filter(l=>l.active).length;

  async function sendFeedback(verdict) {
    setFbBusy(true); setLearned("");
    try {
      const summary = await learn({
        verdict, note: fb,
        context: { task: taskObj.label, brief, headline: dir&&dir.headline, image_prompt: prompt }
      });
      setLearned(summary || "Noted for next time.");
      setFb("");
    } catch(e){ alert("Could not save the lesson: "+e.message); }
    finally { setFbBusy(false); }
  }

  async function direct() {
    if(!brief.trim()) return;
    setErr(""); setDir(null); setImg(null); setLearned(""); setPhase("directing");
    try {
      const system = buildBrandSystem(dna, learnings);
      const refNote = refs.length ? `The founder attached ${refs.length} reference image${refs.length>1?"s":""}. Study ${refs.length>1?"them":"it"} for mood, composition, subject and styling, and let ${refs.length>1?"them":"it"} guide your concept and the image_prompt, while staying in our brand voice.\n\n` : "";
      const szObj = SIZES.find(x=>x.id===size) || SIZES[0];
      const ask = `Task type: ${taskObj.label} (${taskObj.hint}).\nOutput format: ${szObj.label} ${szObj.ratio} at ${size}. Compose for this shape, and say so in the image_prompt.\n${refNote}Brief from the founder: "${brief}"\n\n`+
        `As Brand Director, respond with ONLY a JSON object, no prose, with these keys:\n`+
        `{"concept": string (1-2 sentences, the idea and the feeling),`+
        `"headline": string (short, on-brand, may be empty for pure design tasks),`+
        `"subhead": string,`+
        `"cta": string,`+
        `"image_prompt": string (a full, vivid art-direction prompt for the image model, describing composition, subject, lighting, mood, and any on-image text; must reflect the palette and restraint),`+
        `"notes": string (why this works for the brand)}`;
      const content = refs.length ? [...refs.map(r=>r.block), { type:"text", text:ask }] : ask;
      const { text } = await fnCall("ai-text", { system, messages:[{role:"user",content}], max_tokens:1600 });
      const j = stripJSON(text) || { concept:text, headline:"", subhead:"", cta:"", image_prompt:brief, notes:"" };
      setDir(j);
      setPrompt((j.image_prompt||brief) + IMG_STYLE_SUFFIX);
      setPhase("directed");
    } catch(e){ setErr(e.message); setPhase("idle"); }
  }

  async function render() {
    setErr(""); setPhase("rendering");
    try {
      const { b64 } = await fnCall("ai-image", { prompt, size });
      const url = `data:image/png;base64,${b64}`;
      setImg({ b64, url });
      setPhase("done");
      await saveCreation({ task_type:task, brief, director_out:JSON.stringify(dir), image_prompt:prompt, b64 });
    } catch(e){ setErr(e.message); setPhase("directed"); }
  }

  const directing = phase==="directing", rendering = phase==="rendering";
  const dirState = directing?"busy":(dir?"done":"");
  const desState = rendering?"busy":(img?"done":"");

  return (
    <div className="wrap">
      <div className="page-h serif">Studio</div>
      <div className="page-sub">Describe what you need. Claude directs the concept and copy in our voice, then GPT renders it. You steer at every step.</div>

      {/* the crew */}
      <div className="crew">
        <div className={"crew-card "+dirState}>
          <div className="crew-role">Brand Director</div>
          <div className="crew-who">Claude</div>
          <div className="crew-does">Reads the Brand DNA, shapes the concept, writes the copy and the art direction.</div>
          <span className="badge">{directing?"Thinking…":dir?"Directed":"Ready"}</span>
        </div>
        <div className="crew-arrow">→</div>
        <div className={"crew-card "+desState}>
          <div className="crew-role">Designer</div>
          <div className="crew-who">GPT Image</div>
          <div className="crew-does">Takes the direction and renders the poster, mockup or packaging visual.</div>
          <span className="badge">{rendering?"Rendering…":img?"Rendered":"Waiting"}</span>
        </div>
      </div>

      <div className="row" style={{marginBottom:12}}>
        <span className="mut">The crew works from your Brand DNA and everything it has learned.</span>
        {appliedCount>0&&<span className="applied">✦ {appliedCount} lesson{appliedCount>1?"s":""} applied</span>}
      </div>

      <div className="card">
        <div className="tasks">
          {TASKS.map(t=><button key={t.id} className={"task"+(task===t.id?" on":"")} onClick={()=>{setTask(t.id);setSize(t.size);}}>{t.label}</button>)}
        </div>
        <label className="lbl">Brief</label>
        <textarea className="fld" rows={3} value={brief} onChange={e=>setBrief(e.target.value)}
          placeholder={"e.g. Summer promo poster for the Hot Cheetos corn dog. Playful but premium, lead with a warm memory feeling."} />

        <div className="refs">
          <label className="lbl" style={{marginBottom:9}}>Reference images (optional)</label>
          <div className="ref-row">
            {refs.map(r=>(
              <div className="ref-thumb" key={r.id} style={{backgroundImage:`url(${r.url})`}}>
                <button className="ref-x" onClick={()=>removeRef(r.id)}>✕</button>
              </div>
            ))}
            <button className="ref-add" onClick={()=>refInput.current&&refInput.current.click()} disabled={refBusy}>
              {refBusy?<span className="spin"></span>:<span style={{fontSize:20,lineHeight:1}}>+</span>}
              <span style={{fontSize:10,marginTop:3}}>Add</span>
            </button>
            <input ref={refInput} type="file" accept="image/*" multiple className="hidden" onChange={addRefs} />
          </div>
          {refs.length>0&&<div className="mut" style={{fontSize:11.5,marginTop:8}}>The director will study {refs.length} reference{refs.length>1?"s":""} for mood and composition.</div>}
        </div>

        <div className="refs">
          <label className="lbl" style={{marginBottom:9}}>Size and shape</label>
          <div className="sizes">
            {SIZES.map(sz=>(
              <button key={sz.id} className={"sizebtn"+(size===sz.id?" on":"")} onClick={()=>setSize(sz.id)}>
                <span className={"sz-icon sz-"+sz.ratio.replace(":","-")}></span>
                <span className="sz-l">{sz.label}</span>
                <span className="sz-r">{sz.ratio} · {sz.id.replace("x"," × ")}</span>
              </button>
            ))}
          </div>
        </div>
        <div className="row" style={{marginTop:12}}>
          <button className="btn btn-brick" onClick={direct} disabled={directing||rendering||!brief.trim()}>
            {directing?<span className="spin"></span>:null}{directing?"Directing":"Direct it"}
          </button>
          <span className="mut">{taskObj.hint} · {size.replace("x"," × ")}</span>
        </div>
        {err&&<div className="auth-err" style={{textAlign:"left"}}>{err}</div>}

        {dir&&<div className="director">
          <div className="dir-block"><div className="dir-k">Concept</div><div className="dir-body">{dir.concept}</div></div>
          {(dir.headline||dir.subhead||dir.cta)&&<div className="dir-block"><div className="dir-k">Copy</div>
            {dir.headline&&<div className="dir-head serif">{dir.headline}</div>}
            {dir.subhead&&<div className="dir-sub">{dir.subhead}</div>}
            {dir.cta&&<div className="dir-cta">{dir.cta}</div>}</div>}
          <div className="dir-block"><div className="dir-k">Art direction (editable)</div>
            <textarea className="fld" rows={4} value={prompt} onChange={e=>setPrompt(e.target.value)} /></div>
          {dir.notes&&<div className="dir-block"><div className="dir-k">Why it works</div><div className="dir-body">{dir.notes}</div></div>}
          <div className="row" style={{marginTop:14}}>
            <button className="btn btn-gold" onClick={render} disabled={rendering}>
              {rendering?<span className="spin"></span>:null}{rendering?"Rendering":"Render with GPT"}</button>
          </div>
        </div>}

        {img&&<div className="result">
          <img src={img.url} alt="rendered" />
          <div className="row">
            <a className="btn btn-ghost btn-sm" href={img.url} download={`ugly-${task}-${Date.now()}.png`}>Download</a>
            <button className="btn btn-ghost btn-sm" onClick={()=>addToLibrary({task_type:task,brief,b64:img.b64})}>Save to Library</button>
            <button className="btn btn-ghost btn-sm" onClick={render} disabled={rendering}>Try another render</button>
          </div>
        </div>}

        {dir&&<div className="fb">
          <div className="fb-h">Teach the crew</div>
          <input className="fld" placeholder="What was off, or what you loved. e.g. background too dark, keep the memory feeling, used an em dash again" value={fb} onChange={e=>setFb(e.target.value)} onKeyDown={e=>e.key==="Enter"&&fb.trim()&&sendFeedback("dislike")} />
          <div className="row" style={{marginTop:10}}>
            <button className="btn btn-brick btn-sm" disabled={fbBusy||!fb.trim()} onClick={()=>sendFeedback("dislike")}>{fbBusy?<span className="spin"></span>:null}Off-brand, fix it</button>
            <button className="btn btn-ghost btn-sm" disabled={fbBusy||!fb.trim()} onClick={()=>sendFeedback("emphasis")}>Nailed it, remember this</button>
            <span className="mut" style={{marginLeft:"auto"}}>Repeated notes harden into rules.</span>
          </div>
          {learned&&<div className="learned-toast">{learned}</div>}
        </div>}
      </div>

      {creations&&creations.length>0&&<div className="card">
        <div className="card-h">Recent work</div>
        <div className="hist">
          {creations.slice(0,12).map(c=>c.image_url&&<img key={c.id} src={c.image_url} alt={c.task_type} title={c.brief} />)}
        </div>
      </div>}
    </div>
  );
}

const LKINDS = [
  { id:"dislike",  label:"Dislikes",  ic:"✕", hint:"Things we never want to see" },
  { id:"emphasis", label:"Emphasis",  ic:"★", hint:"Things we always want carried through" },
  { id:"mistake",  label:"Repeat mistakes", ic:"↻", hint:"Errors the crew keeps making" }
];
function Learnings({ learnings, addLearning, toggleLearning, removeLearning }) {
  const [kind, setKind] = useState("dislike");
  const [text, setText] = useState("");
  const list = learnings.filter(l=>l.kind===kind).sort((a,b)=>b.weight-a.weight);
  async function add(){ if(!text.trim())return; await addLearning({kind, text:text.trim(), origin:"manual"}); setText(""); }
  const meta = LKINDS.find(k=>k.id===kind);
  return (
    <div className="wrap">
      <div className="page-h serif">What the studio has learned</div>
      <div className="page-sub">The crew reads this before every job. Give feedback in the Studio and lessons land here on their own. A lesson reinforced many times becomes a hard rule.</div>

      <div className="tasks" style={{marginBottom:18}}>
        {LKINDS.map(k=>{
          const n = learnings.filter(l=>l.kind===k.id&&l.active).length;
          return <button key={k.id} className={"task"+(kind===k.id?" on":"")} onClick={()=>setKind(k.id)}>{k.ic} {k.label}{n?` · ${n}`:""}</button>;
        })}
      </div>

      {list.filter(l=>l.active).length>0&&
        <div className="card" style={{marginBottom:18}}>
          <div className="card-h">Rule strength</div>
          <BarChart data={list.filter(l=>l.active).slice(0,8).map(l=>({label:l.text.length>26?l.text.slice(0,26)+"…":l.text, value:l.weight, color: l.weight>=3?"var(--brick)":"var(--gold)"}))} unit="×" />
          <div className="mut" style={{marginTop:10,fontSize:11.5}}>Bars in brick red are hard rules (reinforced three times or more).</div>
        </div>}

      <div className="card" style={{marginBottom:18}}>
        <label className="lbl">Add a {meta.label.toLowerCase().replace(/s$/,"")} rule</label>
        <div className="row">
          <input className="fld" style={{flex:1,minWidth:240}} placeholder={meta.hint} value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} />
          <button className="btn btn-gold btn-sm" onClick={add}>Add rule</button>
        </div>
      </div>

      {list.length===0
        ? <div className="empty"><div className="em-ic">{meta.ic}</div><div style={{fontWeight:600,marginBottom:4}}>No {meta.label.toLowerCase()} yet</div><div className="mut">React to work in the Studio and the crew will write these for you.</div></div>
        : <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {list.map(l=>(
              <div className="card" key={l.id} style={{padding:"15px 18px",opacity:l.active?1:.5}}>
                <div className="row" style={{alignItems:"flex-start"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600,lineHeight:1.4}}>{l.text}</div>
                    {l.examples&&l.examples.length>0&&<div className="mut" style={{marginTop:5,fontSize:11.5}}>from: {l.examples.slice(-2).join(" · ")}</div>}
                  </div>
                  <div className="row" style={{flexShrink:0}}>
                    {l.weight>1&&<span className="lweight" title="times reinforced">×{l.weight}{l.weight>=3?" hard rule":""}</span>}
                    <button className="btn btn-ghost btn-sm" onClick={()=>toggleLearning(l)}>{l.active?"Mute":"Enable"}</button>
                    <button className="btn btn-ghost btn-sm" onClick={()=>removeLearning(l)}>✕</button>
                  </div>
                </div>
              </div>
            ))}
          </div>}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  render(){
    if(this.state.err) return (
      <div className="card crash">
        <h2 className="serif">Something tripped up</h2>
        <p>The studio hit an unexpected error. Reloading usually clears it. If it keeps happening, note what you were doing.</p>
        <button className="btn btn-gold" onClick={()=>location.reload()}>Reload the studio</button>
      </div>
    );
    return this.props.children;
  }
}

function BarChart({ data, unit }) {
  const max = Math.max(1, ...data.map(d=>d.value));
  return (
    <div className="chart">
      {data.map((d,i)=>(
        <div className="barrow" key={i}>
          <span className="bl">{d.label}</span>
          <div className="bartrack"><div className="barfill" style={{width:`${Math.round(d.value/max*100)}%`,background:d.color||"var(--gold)"}}></div></div>
          <span className="bn">{d.value}{unit||""}</span>
        </div>
      ))}
    </div>
  );
}

function ChatSheet({ open, onClose, dna, learnings }) {
  const [msgs, setMsgs] = useState([]);
  const [q, setQ] = useState("");
  const [busy, setBusy] = useState(false);
  const bodyRef = useRef(null);
  useEffect(()=>{ if(bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight; },[msgs,busy]);
  const suggestions = ["Give me 3 poster ideas for a fall drink","Write a warm caption for the Potato corn dog","What colors should our packaging avoid?"];

  async function send(text){
    const content = (text||q).trim(); if(!content||busy) return;
    const next = [...msgs,{role:"user",content}];
    setMsgs(next); setQ(""); setBusy(true);
    try{
      const system = buildBrandSystem(dna, learnings) + "\nYou are the studio's on-call brand advisor in a chat. Answer briefly and practically, always in our voice. No em dashes.";
      const { text:reply } = await fnCall("ai-text",{ system, messages:next.map(m=>({role:m.role,content:m.content})), max_tokens:900 });
      setMsgs(m=>[...m,{role:"assistant",content:reply}]);
    }catch(e){ setMsgs(m=>[...m,{role:"assistant",content:"I could not reach the model just now. "+e.message}]); }
    finally{ setBusy(false); }
  }
  if(!open) return null;
  return (
    <div className="sheet-bg" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-head">
          <div><div className="sh-role">Brand Director</div><div className="sh-who serif">Ask the studio</div></div>
          <button className="sheet-x" onClick={onClose}>✕</button>
        </div>
        <div className="sheet-body" ref={bodyRef}>
          {msgs.length===0 && <>
            <div className="bub ai">Ask me anything about the brand, copy, or a design direction. I answer in our voice and with everything the studio has learned.</div>
            <div>{suggestions.map((s,i)=><button key={i} className="bub sug" onClick={()=>send(s)}>{s}</button>)}</div>
          </>}
          {msgs.map((m,i)=><div key={i} className={"bub "+(m.role==="user"?"me":"ai")}>{m.content}</div>)}
          {busy && <div className="bub ai"><span className="spin"></span>Thinking</div>}
        </div>
        <div className="sheet-foot">
          <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask the studio" />
          <button onClick={()=>send()} disabled={busy||!q.trim()}>Send</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [ready, setReady] = useState(false);
  const [session, setSession] = useState(null);
  const [nav, setNav] = useState("dna");
  const [brand, setBrand] = useState(()=>{ try { return localStorage.getItem("ugly_studio_brand")||"ugly"; } catch { return "ugly"; } });
  const [dna, setDna] = useState(defaultDNA(brand));
  const [items, setItems] = useState([]);
  const [creations, setCreations] = useState([]);
  const [learnings, setLearnings] = useState([]);
  const [railOpen, setRailOpen] = useState(false);
  const [chatOpen, setChatOpen] = useState(false);
  const [installEvt, setInstallEvt] = useState(null);
  const [notifState, setNotifState] = useState(typeof Notification!=="undefined"?Notification.permission:"unsupported");
  const [notifDismissed, setNotifDismissed] = useState(false);
  const [notifBusy, setNotifBusy] = useState(false);

  /* ---- boot ---- */
  useEffect(()=>{
    registerSW();
    const onInstall = (e)=>{ e.preventDefault(); setInstallEvt(e); };
    window.addEventListener("beforeinstallprompt", onInstall);
    const onFocus = ()=>setBadge(0);
    document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) setBadge(0); });
    window.addEventListener("focus", onFocus);
    setBadge(0);
    return ()=>{ window.removeEventListener("beforeinstallprompt", onInstall); window.removeEventListener("focus", onFocus); };
  },[]);

  useEffect(()=>{
    if(LOCAL){ seedLocal(brand); setReady(true); return; }
    sb.auth.getSession().then(({data})=>{ setSession(data.session); setReady(true); });
    const { data:sub } = sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);

  // reload everything when the signed-in user or the active brand changes
  useEffect(()=>{ if(session) loadAll(brand); },[session, brand]);
  // in preview mode, reseed on brand switch
  useEffect(()=>{ if(LOCAL && ready) seedLocal(brand); },[brand]);
  // keep the app themed to the active brand's palette
  useEffect(()=>{ applyBrandTheme(dna); },[dna]);

  function switchBrand(slug){
    if(slug===brand) return;
    try { localStorage.setItem("ugly_studio_brand", slug); } catch {}
    setDna(defaultDNA(slug)); setItems([]); setCreations([]); setLearnings([]);
    setBrand(slug); setNav("dna"); setRailOpen(false);
  }

  function seedLocal(b){
    const isUmma = b==="umma";
    setDna(defaultDNA(b));
    setItems(isUmma ? [
      { id:"u1", title:"Umma logo", kind:"logo", tags:["logo"], file_url:"/icons/umma.png", thumb_url:"/icons/umma.png", ai_analysis:"" }
    ] : [
      { id:"s1", title:"Store wordmark", kind:"logo", tags:["logo","gold"], file_url:"/icons/wordmark.png", thumb_url:"/icons/wordmark.png",
        ai_analysis:"Circular gold badge on white. Restrained, premium, hand-crafted feel. Golden tan #EABF70 on paper. This is the anchor of the identity." },
      { id:"s2", title:"Primary logo", kind:"logo", tags:["logo"], file_url:"/icons/logo.png", thumb_url:"/icons/logo.png", ai_analysis:"" }
    ]);
    setCreations([]);
    setLearnings(isUmma ? [
      { id:"m1", kind:"emphasis", text:"Lead with the feeling of a mother's kitchen before ingredients.", weight:2, active:true, examples:[] }
    ] : [
      { id:"k1", kind:"dislike",  text:"No dark navy backgrounds on product posters. Anchor in cream and paper.", weight:3, active:true, examples:["poster: background too dark"] },
      { id:"k2", kind:"emphasis", text:"Always lead with the warm memory feeling before the product or the offer.", weight:4, active:true, examples:[] },
      { id:"k3", kind:"mistake",  text:"Stop slipping em dashes into headlines. Use commas or periods.", weight:2, active:true, examples:["copy: used an em dash"] }
    ]);
  }

// Absorb a brand book verbatim so the crew can work straight from it.
  async function absorbBook(file, onProgress){
    const k = fileKind(file);
    const report = (m)=>{ if(onProgress) onProgress(m); };
    if(k==="html"){
      report("Reading the brand book...");
      return htmlToText(await file.text());
    }
    if(k==="pdf"){
      report("Reading the brand book...");
      const pdf = await openPdf(file);
      const total = pdf.numPages;
      let out = "";
      for(let i=1;i<=total;i++){
        report(`Reading page ${i} of ${total}...`);
        out += `\n\n[page ${i}]\n` + await pdfPageText(pdf, i);
      }
      // a scanned book has no usable text layer, fall back to reading the pages as images
      const avg = out.length / Math.max(total,1);
      if(avg >= 80) return out.trim();
      report("This book is scanned, reading the pages...");
      return await transcribeInBackground(file, "pdf", onProgress);
    }
    return await transcribeInBackground(file, "image", onProgress);
  }

  // Pages that have no text layer are transcribed by the background reader (accurate model, no timeout).
  async function transcribeInBackground(file, kind, onProgress){
    const jobId = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    const up = async(path, blob, ct)=>{ const { error } = await sb.storage.from("library").upload(path, blob, { contentType:ct, upsert:true }); if(error) throw new Error(error.message); return sb.storage.from("library").getPublicUrl(path).data.publicUrl; };
    const pages = [];
    if(kind==="pdf"){
      const pdf = await openPdf(file); const total = Math.min(pdf.numPages, 60);
      for(let i=1;i<=total;i++){
        if(onProgress) onProgress(`Preparing page ${i} of ${total}...`);
        pages.push(await up(`${brand}/_bookpages/${jobId}/p${String(i).padStart(3,"0")}.jpg`, await pdfPageBlob(pdf, i, 1400), "image/jpeg"));
      }
    } else {
      const sh = await shrinkImage(file, 1600, "image/jpeg", 0.85).catch(()=>({ blob:file }));
      pages.push(await up(`${brand}/_bookpages/${jobId}/p001.jpg`, sh.blob, "image/jpeg"));
    }
    await sb.from("brandbook_jobs").insert({ id:jobId, brand, status:"pending", kind, mode:"transcribe", pages, book_text:"" });
    await fetch(`${FN}/brandbook-process-background`, { method:"POST", headers:{ "content-type":"application/json" }, body:JSON.stringify({ jobId, mode:"transcribe" }) }).catch(()=>{});
    const startedAt = Date.now();
    return await new Promise((resolve, reject)=>{
      const poll = async()=>{
        if(Date.now()-startedAt > 15*60*1000) return reject(new Error("Reading is taking unusually long. Check back in a moment."));
        let data=null;
        try { ({ data } = await sb.from("brandbook_jobs").select("status,progress,result,error").eq("id",jobId).maybeSingle()); } catch {}
        if(data && data.progress && onProgress) onProgress(data.progress);
        if(data && data.status==="done") return resolve((data.result && data.result.text) || "");
        if(data && data.status==="error") return reject(new Error(data.error||"Reading failed"));
        setTimeout(poll, 3000);
      };
      setTimeout(poll, 3000);
    });
  }

  /* ---- library ---- */
  async function addItems(files, chosenKind){
    const override = chosenKind && chosenKind!=="auto" ? chosenKind : null;
    for(const f of files){
      const k = fileKind(f);
      try {
        if(LOCAL){
          let thumb, kind="other", tags=[];
          if(k==="image"){ thumb=URL.createObjectURL(f); kind="poster"; }
          else if(k==="pdf"){ const t=await pdfFirstPageThumb(f); thumb=URL.createObjectURL(t.blob); kind="deck"; }
          else if(k==="html"){ thumb=""; kind="other"; tags=["html"]; }
          if(override) kind=override;
          const item = { id:"l"+Math.random().toString(36).slice(2), title:f.name.replace(/\.[^.]+$/,""), kind, tags,
            file_url:URL.createObjectURL(f), thumb_url:thumb, ai_analysis:"", _file:f, _analyzing:true };
          setItems(p=>[item,...p]);
          analyze(item).catch(()=>{});
          continue;
        }
        const stamp = `${brand}/${Date.now()}-${Math.random().toString(36).slice(2)}`;
        const safe = f.name.replace(/[^\w.\-]/g,"_");
        let file_url, thumb_url="", kind="other", tags=[];
        if(k==="image"){
          // keep the original exactly as uploaded
          await sb.storage.from("library").upload(`${stamp}-${safe}`, f, { contentType: f.type||"image/jpeg" });
          file_url = sb.storage.from("library").getPublicUrl(`${stamp}-${safe}`).data.publicUrl;
          // a light preview only for fast grid loading, same aspect ratio, never shown cropped
          try {
            const s = await shrinkImage(f, 1400, "image/jpeg", 0.82);
            if (s && s.blob && s.blob.size < f.size) {
              await sb.storage.from("library").upload(`${stamp}-thumb.jpg`, s.blob, { contentType:"image/jpeg" });
              thumb_url = sb.storage.from("library").getPublicUrl(`${stamp}-thumb.jpg`).data.publicUrl;
            } else { thumb_url = file_url; }
          } catch { thumb_url = file_url; }
          kind="poster";
        } else if(k==="pdf"){
          const t = await pdfFirstPageThumb(f);
          await sb.storage.from("library").upload(`${stamp}-${safe}`, f, { contentType:"application/pdf" });
          await sb.storage.from("library").upload(`${stamp}-thumb.jpg`, t.blob, { contentType:"image/jpeg" });
          file_url = sb.storage.from("library").getPublicUrl(`${stamp}-${safe}`).data.publicUrl;
          thumb_url = sb.storage.from("library").getPublicUrl(`${stamp}-thumb.jpg`).data.publicUrl; kind="deck";
        } else {
          await sb.storage.from("library").upload(`${stamp}-${safe}`, f, { contentType: f.type||"text/plain" });
          file_url = sb.storage.from("library").getPublicUrl(`${stamp}-${safe}`).data.publicUrl;
          kind="other"; if(k==="html") tags=["html"];
        }
        if(override) kind=override;
        const { data:row } = await sb.from("library_items").insert({ brand, title:f.name.replace(/\.[^.]+$/,""), kind, tags, file_url, thumb_url, source:"upload" }).select().single();
        if(row){ setItems(p=>[{...row,_analyzing:true},...p]); analyze(row).catch(()=>{}); }
      } catch(e){ alert(`Could not add ${f.name}: ${e.message}`); }
    }
  }

  /* ---- learning memory ---- */
  const STOP = new Set(["the","a","an","to","of","on","in","is","are","it","its","was","were","and","or","for","with","that","this","too","be","as","at","we","our","dont","do","not","no","never","always","keep","stop","use","using","used","again"]);
  function tokenSet(s){
    return new Set((s||"").toLowerCase().replace(/[^\w\s]/g," ").split(/\s+/)
      .filter(Boolean)
      .map(w => (w.length>3 && !w.endsWith("ss")) ? w.replace(/(?:es|s)$/,"") : w) // crude singularize
      .filter(w => w && !STOP.has(w)));
  }
  function jaccard(a,b){ let i=0; a.forEach(w=>{ if(b.has(w)) i++; }); const u=a.size+b.size-i; return u? i/u : 0; }
  function findSimilar(kind, text){
    const n = tokenSet(text);
    return learnings.find(l => l.kind===kind && jaccard(n, tokenSet(l.text)) >= 0.4);
  }

  async function reinforce(l, example){
    setLearnings(p=>p.map(x=>x.id===l.id?{...x,weight:x.weight+1,examples:[...(x.examples||[]),example].filter(Boolean).slice(-5)}:x));
